name: Daily Toolify 5D Report Generator

on:
  schedule:
    # UTC 22:00 == Beijing time 06:00 (next day)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run main script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          MAX_MOST_USED: '150'
          MAX_NEW_AIS: '120'
          SELECTED_MIN: '100'
          SELECTED_MAX: '140'
          PLAYWRIGHT_HEADLESS: 'true'
          # Manual runs always create a new Notion page; scheduled runs keep daily idempotency.
          NOTION_SKIP_IF_EXISTS: ${{ github.event_name == 'workflow_dispatch' && 'false' || 'true' }}
          REPORT_TIMEZONE: 'Asia/Shanghai'
        run: python main.py
